name: Queueless CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-ci:
    name: Backend CI & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: dotnet restore

      - name: Build Backend
        working-directory: ./backend
        run: dotnet build --no-restore

      - name: Run Tests & Collect Coverage
        working-directory: ./backend
        run: dotnet test --no-build --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: backend/coverage/**/coverage.cobertura.xml
          badge: true
          fail_below_min: true 
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '70 80' 

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Frontend Dependencies
        working-directory: ./queueless
        run: flutter pub get

      - name: Analyze Code (Lint Gates)
        
        working-directory: ./queueless
        run: flutter analyze

      - name: Run Flutter Tests
        working-directory: ./queueless
        run: flutter test
