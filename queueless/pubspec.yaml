name: queueless
description: "QueueLess - Smart Queue Management & Appointment Scheduling Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  http: ^1.6.0
  socket_io_client: ^2.0.3+1
  qr_flutter: ^4.1.0
  home_widget: ^0.6.0
  flutter_local_notifications: ^19.4.1
  flutter_map: ^8.2.1
  latlong2: ^0.9.1
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/logo.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/branding/logo.png
    background_color: "#131922"
    theme_color: "#1BD0C7"
  windows:
    generate: true
    image_path: assets/branding/logo.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/branding/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/branding/logo.png
